name: Build & Publish Thesis PDF

on:
  push:
    branches: [ main ]

concurrency:
  group: build-thesis
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Compile LaTeX and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Cache for Tectonic
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/tectonic
            ~/.cache/tectonic-texlive
          key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex', '**/*.bib', '**/*.sty') }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install tectonic if missing
        run: |
          echo "Installing system dependencies required by tectonic..."
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libpng-dev \
            zlib1g-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libexpat1-dev \
            build-essential

          if ! command -v tectonic >/dev/null 2>&1; then
            cargo install --locked tectonic
          else
            echo "tectonic already installed"
          fi
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH

      - name: Compile LaTeX with Tectonic
        run: |
          tectonic --print_logs thesis.tex

      - name: Ensure public directory exists and copy PDF
        run: |
          mkdir -p public
          if [ -f thesis.pdf ]; then cp thesis.pdf public/thesis.pdf; else echo "thesis.pdf not found"; fi

      - name: List public contents (for debug)
        run: ls -la public || true

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          allow_empty_commit: false
